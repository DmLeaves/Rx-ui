name: Smoke Test - install.sh

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test (e.g. v0.1.3). Leave empty for latest."
        required: false
        type: string

jobs:
  installer-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run installer in CI mode
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag || 'latest' }}"
          sudo env RX_UI_TAG="$TAG" RX_UI_SKIP_SYSTEMD=1 bash ./install.sh

      - name: Verify installed files
        shell: bash
        run: |
          set -euo pipefail
          test -x /usr/local/rx-ui/rx-ui
          test -x /usr/bin/Rx-ui
          test -f /etc/systemd/system/rx-ui.service
          /usr/local/rx-ui/rx-ui setting -show

      - name: Verify global menu script works from any cwd
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp
          /usr/bin/Rx-ui setting | grep -E '^webPort:'

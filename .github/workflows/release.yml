name: Release Rx-ui

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动发布的版本号 (如 v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "${REF#v}" > config/version
          echo "构建版本: ${REF} (config/version=$(cat config/version))"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          cd ..
          rm -rf internal/web/dist
          cp -r web/dist internal/web/dist

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags "-s -w" -o rx-ui .
          file rx-ui

      - name: Package
        run: |
          tar -czf rx-ui-linux-${{ matrix.goarch }}.tar.gz rx-ui
          ls -la rx-ui-linux-${{ matrix.goarch }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rx-ui-linux-${{ matrix.goarch }}
          path: rx-ui-linux-${{ matrix.goarch }}.tar.gz
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release (single job, avoids concurrent-create race)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: dist/**/*.tar.gz

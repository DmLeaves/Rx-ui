name: Smoke Test - Linux amd64 One-line Install

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test (e.g. v0.1.2). Leave empty to test latest."
        required: false
        type: string

jobs:
  smoke-install:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve download URL
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG=""

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ -n "${{ github.event.inputs.tag || '' }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          fi

          if [[ -n "$TAG" ]]; then
            URL="https://github.com/${REPO}/releases/download/${TAG}/rx-ui-linux-amd64.tar.gz"
          else
            URL="https://github.com/${REPO}/releases/latest/download/rx-ui-linux-amd64.tar.gz"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Using URL: $URL"

      - name: Wait for release asset to become downloadable
        if: ${{ steps.resolve.outputs.tag != '' }}
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG="${{ steps.resolve.outputs.tag }}"
          URL="${{ steps.resolve.outputs.url }}"
          ASSET="rx-ui-linux-amd64.tar.gz"

          echo "Waiting for $ASSET in $REPO@$TAG"
          for i in $(seq 1 30); do
            API_OK=0
            HTTP_OK=0

            ASSET_ID=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/tags/${TAG}" \
              | jq -r --arg name "$ASSET" '.assets[]? | select(.name==$name) | .id' \
              | head -n1 || true)

            if [[ -n "${ASSET_ID:-}" && "$ASSET_ID" != "null" ]]; then
              API_OK=1
            fi

            if curl -fsSI "$URL" >/dev/null; then
              HTTP_OK=1
            fi

            if [[ "$API_OK" -eq 1 && "$HTTP_OK" -eq 1 ]]; then
              echo "Asset is ready (id=$ASSET_ID)"
              exit 0
            fi

            echo "[$i/30] asset not ready yet, retry in 10s..."
            sleep 10
          done

          echo "Timed out waiting for asset: $URL"
          exit 1

      - name: Run one-line install command
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/rx-ui-smoke
          cd /tmp/rx-ui-smoke

          # Keep this aligned with README one-line install for Linux amd64
          wget -O rx-ui-linux-amd64.tar.gz "${{ steps.resolve.outputs.url }}"
          tar -xzf rx-ui-linux-amd64.tar.gz
          chmod +x rx-ui-linux-amd64

      - name: Boot and health-check
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/rx-ui-smoke

          ./rx-ui-linux-amd64 > rx-ui.log 2>&1 &
          RX_PID=$!
          echo "Started rx-ui pid=$RX_PID"

          cleanup() {
            kill "$RX_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          # wait up to 60s for panel API
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:54321/api/v1/health >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done

          echo "Health check failed. Last logs:"
          tail -n 200 rx-ui.log || true
          exit 1

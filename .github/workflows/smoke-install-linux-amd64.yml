name: Smoke Test - Linux amd64 One-line Install

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test (e.g. v0.1.2). Leave empty to test latest."
        required: false
        type: string

jobs:
  smoke-install:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve download URL
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG=""

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ -n "${{ github.event.inputs.tag || '' }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          fi

          if [[ -n "$TAG" ]]; then
            URL="https://github.com/${REPO}/releases/download/${TAG}/rx-ui-linux-amd64.tar.gz"
          else
            URL="https://github.com/${REPO}/releases/latest/download/rx-ui-linux-amd64.tar.gz"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Using URL: $URL"

      - name: Run one-line install command
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/rx-ui-smoke
          cd /tmp/rx-ui-smoke

          # Keep this aligned with README one-line install for Linux amd64
          wget -O rx-ui-linux-amd64.tar.gz "${{ steps.resolve.outputs.url }}"
          tar -xzf rx-ui-linux-amd64.tar.gz
          chmod +x rx-ui-linux-amd64

      - name: Boot and health-check
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/rx-ui-smoke

          ./rx-ui-linux-amd64 > rx-ui.log 2>&1 &
          RX_PID=$!
          echo "Started rx-ui pid=$RX_PID"

          cleanup() {
            kill "$RX_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          # wait up to 60s for panel API
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:54321/api/v1/health >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done

          echo "Health check failed. Last logs:"
          tail -n 200 rx-ui.log || true
          exit 1

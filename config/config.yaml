# Rx-ui 配置文件

app:
  name: "Rx-ui"
  version: "0.3.2"

server:
  host: "0.0.0.0"
  port: 54321
  mode: "release" # debug, release, test

database:
  driver: "sqlite"
  path: "./data/rx-ui.db"

xray:
  bin_path: "/usr/local/bin/xray"
  config_path: "./data/xray.json"
  restart_delay: 3

log:
  level: "info"
  path: "./logs/rx-ui.log"
